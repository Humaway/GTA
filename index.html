<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down City Multiplayer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlays */
        #startMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .menu-box { background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .menu-box input { margin: 10px; padding: 10px; font-size: 16px; }
        .menu-box button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        
        /* Mobile Controls */
        #mobileControls { position: absolute; bottom: 20px; left: 20px; display: none; z-index: 5; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        .joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }
        #actionBtn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.5); border-radius: 50%; display: none; z-index: 5; color: white; text-align: center; line-height: 80px; font-weight: bold; user-select: none;}
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h2>City Multiplayer</h2>
            <input type="text" id="playerName" placeholder="Enter Username" maxlength="12"><br>
            <label>Character Color: </label>
            <input type="color" id="playerColor" value="#ff0000"><br>
            <button id="joinBtn">Spawn In</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="joystick-base" id="joystickBase">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div id="actionBtn">STEAL</div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- 1. FIREBASE SETUP (REPLACE WITH YOUR CONFIG) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDLt15iYS6MNWr5BxdE-4S-1WLM4ZAG1RM",
      authDomain: "feet-df8c7.firebaseapp.com",
      databaseURL: "https://feet-df8c7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "feet-df8c7",
      storageBucket: "feet-df8c7.firebasestorage.app",
      messagingSenderId: "388006445651",
      appId: "1:388006445651:web:9f6498a9a9aeee4e9d3ca6",
      measurementId: "G-EJ8KTJZFSM"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- 2. GAME STATE & VARIABLES ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let playerId = null;
    let playerRef = null;
    
    // Added 'angle' to track rotation
    let localPlayer = { x: 0, y: 0, angle: 0, color: '#ff0000', name: 'Player', isDriving: false };
    let otherPlayers = {};
    
    const mapSize = { width: 3000, height: 3000 }; 
    const camera = { x: 0, y: 0 };
    const speed = 3; // Slowed down from 5

    const keys = { w: false, a: false, s: false, d: false };
    let joystickVector = { x: 0, y: 0 };

    // --- 3. MAP GENERATION ---
    const buildings = [];
    const roadWidth = 140;

    function generateCity() {
        const blockSize = 400;
        for (let x = roadWidth; x < mapSize.width; x += blockSize + roadWidth) {
            for (let y = roadWidth; y < mapSize.height; y += blockSize + roadWidth) {
                // Create varied building shapes inside the block
                const bWidth = blockSize - (Math.random() * 120);
                const bHeight = blockSize - (Math.random() * 120);
                const offsetX = (blockSize - bWidth) / 2;
                const offsetY = (blockSize - bHeight) / 2;
                
                buildings.push({
                    x: x + offsetX,
                    y: y + offsetY,
                    w: bWidth,
                    h: bHeight
                });
            }
        }
    }
    generateCity();

    // --- 4. INITIALIZATION & UI ---
    document.getElementById('joinBtn').addEventListener('click', () => {
        const name = document.getElementById('playerName').value || "Guest";
        const color = document.getElementById('playerColor').value;
        
        // Spawn player safely on a road (rough approximation to avoid spawning inside buildings)
        localPlayer.x = roadWidth / 2 + (Math.floor(Math.random() * 2) * 500);
        localPlayer.y = roadWidth / 2 + (Math.floor(Math.random() * 2) * 500);
        localPlayer.name = name;
        localPlayer.color = color;

        setupMultiplayer();
        document.getElementById('startMenu').style.display = 'none';
        
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobileControls').style.display = 'block';
            document.getElementById('actionBtn').style.display = 'block';
            setupMobileControls();
        }

        requestAnimationFrame(gameLoop);
    });

    // --- 5. MULTIPLAYER LOGIC ---
    function setupMultiplayer() {
        playerId = firebase.database().ref().child('players').push().key;
        playerRef = db.ref(`players/${playerId}`);
        playerRef.onDisconnect().remove();
        playerRef.set(localPlayer);

        db.ref('players').on('value', (snapshot) => {
            otherPlayers = snapshot.val() || {};
            delete otherPlayers[playerId]; 
        });
    }

    function updateServerPosition() {
        if (playerRef) {
            // Now syncing angle as well
            playerRef.update({ x: localPlayer.x, y: localPlayer.y, angle: localPlayer.angle });
        }
    }

    // --- 6. CONTROLS ---
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup',   (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    function setupMobileControls() {
        const base = document.getElementById('joystickBase');
        const stick = document.getElementById('joystickStick');
        let active = false;

        base.addEventListener('touchstart', (e) => { active = true; updateJoystick(e); });
        base.addEventListener('touchmove', (e) => { if(active) updateJoystick(e); e.preventDefault(); }, {passive: false});
        base.addEventListener('touchend', () => { 
            active = false; 
            stick.style.transform = `translate(0px, 0px)`; 
            joystickVector = {x: 0, y: 0}; 
        });

        function updateJoystick(e) {
            const rect = base.getBoundingClientRect();
            const touch = e.targetTouches[0];
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2);
            const angle = Math.atan2(dy, dx);

            joystickVector.x = Math.cos(angle) * (distance / (rect.width/2));
            joystickVector.y = Math.sin(angle) * (distance / (rect.width/2));

            stick.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;
        }
    }

    // --- 7. PHYSICS & COLLISIONS ---
    function checkCollision(px, py, radius) {
        // Circle vs Rectangle (AABB) Collision
        for (let b of buildings) {
            // Find the closest point to the circle within the rectangle
            let closestX = Math.max(b.x, Math.min(px, b.x + b.w));
            let closestY = Math.max(b.y, Math.min(py, b.y + b.h));

            // Calculate the distance between the circle's center and this closest point
            let distanceX = px - closestX;
            let distanceY = py - closestY;
            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            // If the distance is less than the circle's radius, there is a collision
            if (distanceSquared < (radius * radius)) {
                return true; 
            }
        }
        return false;
    }

    // --- 8. GAME LOOP & RENDERING ---
    function update() {
        let nextX = localPlayer.x;
        let nextY = localPlayer.y;

        // Calculate intended next position
        if (keys.w) nextY -= speed;
        if (keys.s) nextY += speed;
        if (keys.a) nextX -= speed;
        if (keys.d) nextX += speed;

        if (joystickVector.x !== 0 || joystickVector.y !== 0) {
            nextX += joystickVector.x * speed;
            nextY += joystickVector.y * speed;
        }

        // Calculate rotation angle if moving
        if (nextX !== localPlayer.x || nextY !== localPlayer.y) {
             localPlayer.angle = Math.atan2(nextY - localPlayer.y, nextX - localPlayer.x);
        }

        const playerRadius = 15;
        
        // Clamp to map borders
        nextX = Math.max(playerRadius, Math.min(nextX, mapSize.width - playerRadius));
        nextY = Math.max(playerRadius, Math.min(nextY, mapSize.height - playerRadius));

        // Apply movement if NO collision (Slide Logic)
        let moved = false;
        
        // Try moving X
        if (nextX !== localPlayer.x && !checkCollision(nextX, localPlayer.y, playerRadius)) {
            localPlayer.x = nextX;
            moved = true;
        }
        // Try moving Y
        if (nextY !== localPlayer.y && !checkCollision(localPlayer.x, nextY, playerRadius)) {
            localPlayer.y = nextY;
            moved = true;
        }

        if (moved) updateServerPosition();

        camera.x = Math.max(0, Math.min(localPlayer.x - canvas.width / 2, mapSize.width - canvas.width));
        camera.y = Math.max(0, Math.min(localPlayer.y - canvas.height / 2, mapSize.height - canvas.height));
    }

    function draw() {
        ctx.fillStyle = '#111'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y); 

        // Asphalt ground
        ctx.fillStyle = '#444'; 
        ctx.fillRect(0, 0, mapSize.width, mapSize.height);

        // Draw Buildings & Sidewalks
        for (let b of buildings) {
            // Sidewalk
            ctx.fillStyle = '#777';
            ctx.fillRect(b.x - 12, b.y - 12, b.w + 24, b.h + 24);
            
            // Main Building structure
            ctx.fillStyle = '#2b2b2b'; 
            ctx.fillRect(b.x, b.y, b.w, b.h);

            // Inner Roof detail for depth
            ctx.fillStyle = '#1f1f1f'; 
            ctx.fillRect(b.x + 10, b.y + 10, b.w - 20, b.h - 20);
        }

        // Draw Road Centerlines
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([20, 20]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = roadWidth/2; x < mapSize.width; x += 400 + roadWidth) {
            ctx.moveTo(x, 0); ctx.lineTo(x, mapSize.height);
        }
        for (let y = roadWidth/2; y < mapSize.height; y += 400 + roadWidth) {
            ctx.moveTo(0, y); ctx.lineTo(mapSize.width, y);
        }
        ctx.stroke();
        ctx.setLineDash([]); 

        // Draw Other Players
        for (const id in otherPlayers) {
            const p = otherPlayers[id];
            drawEntity(p.x, p.y, p.color, p.name, false, p.angle || 0);
        }

        // Draw Local Player
        drawEntity(localPlayer.x, localPlayer.y, localPlayer.color, localPlayer.name, true, localPlayer.angle);

        ctx.restore(); 
    }

    // Render complex character
    function drawEntity(x, y, color, name, isLocal = false, angle = 0) {
        ctx.save();
        
        // Move to entity location and rotate facing direction
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Body (Shoulders)
        ctx.fillStyle = '#222'; // Dark shirt/jacket
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 22, 0, 0, Math.PI * 2);
        ctx.fill();

        // Hands (Fists forward)
        ctx.fillStyle = '#ffccaa'; // Skin tone approximation
        ctx.beginPath();
        ctx.arc(14, 15, 5, 0, Math.PI * 2); // Right hand
        ctx.fill();
        ctx.beginPath();
        ctx.arc(14, -15, 5, 0, Math.PI * 2); // Left hand
        ctx.fill();

        // Head
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(4, 0, 12, 0, Math.PI * 2); // Head offset slightly forward
        ctx.fill();
        
        // Head outline to pop
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore(); // Undo rotation so nameplate stays flat

        // Draw Nameplate
        ctx.fillStyle = 'white';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        // Add a slight shadow to text so it's readable over light ground
        ctx.shadowColor = "black";
        ctx.shadowBlur = 3;
        ctx.fillText(name, x, y - 30);
        ctx.shadowBlur = 0; // Reset shadow
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
