<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down City Multiplayer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #startMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .menu-box { background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .menu-box input { margin: 10px; padding: 10px; font-size: 16px; }
        .menu-box button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        
        #mobileControls { position: absolute; bottom: 20px; left: 20px; display: none; z-index: 5; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        .joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }
        #actionBtn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.5); border-radius: 50%; display: none; z-index: 5; color: white; text-align: center; line-height: 80px; font-weight: bold; user-select: none;}
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h2>City Multiplayer</h2>
            <input type="text" id="playerName" placeholder="Enter Username" maxlength="12"><br>
            <label>Character Color: </label>
            <input type="color" id="playerColor" value="#ff0000"><br>
            <button id="joinBtn">Spawn In</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="joystick-base" id="joystickBase">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div id="actionBtn">ACTION</div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- 1. FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyDLt15iYS6MNWr5BxdE-4S-1WLM4ZAG1RM",
      authDomain: "feet-df8c7.firebaseapp.com",
      databaseURL: "https://feet-df8c7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "feet-df8c7",
      storageBucket: "feet-df8c7.firebasestorage.app",
      messagingSenderId: "388006445651",
      appId: "1:388006445651:web:9f6498a9a9aeee4e9d3ca6",
      measurementId: "G-EJ8KTJZFSM"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. GAME STATE & VARIABLES ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playerId = null;
    let localPlayer = { x: 0, y: 0, angle: 0, color: '#ff0000', name: 'Player', drivingId: null };
    let otherPlayers = {};
    let cars = {}; 
    
    // Config
    const TARGET_VIEW_HEIGHT = 1200; 
    const PLAYER_SPEED = 2.5; // Normalized speed
    const keys = { w: false, a: false, s: false, d: false, e: false };
    let joystickVector = { x: 0, y: 0 };
    let actionPressed = false;

    // --- 3. ORGANIC MAP GENERATION (Random Walk) ---
    const TILE_SIZE = 200; 
    const GRID_SIZE = 30; // 30x30 tiles = 6000x6000 map
    const mapSize = { width: GRID_SIZE * TILE_SIZE, height: GRID_SIZE * TILE_SIZE }; 
    const camera = { x: 0, y: 0 };
    
    let grid = new Array(GRID_SIZE).fill(0).map(() => new Array(GRID_SIZE).fill('BUILDING'));
    const zones = []; // Pre-calculated rendering zones

    let mapSeed = 42; 
    function seededRandom() { let x = Math.sin(mapSeed++) * 10000; return x - Math.floor(x); }

    function generateOrganicCity() {
        // Drunkard's Walk Algorithm to carve organic paths
        let px = Math.floor(GRID_SIZE / 2);
        let py = Math.floor(GRID_SIZE / 2);
        
        for (let i = 0; i < 1500; i++) {
            // Carve a 2x2 area to ensure roads are wide enough for cars
            if(px > 0 && py > 0 && px < GRID_SIZE-1 && py < GRID_SIZE-1) {
                grid[px][py] = 'ROAD';
                grid[px+1][py] = 'ROAD';
                grid[px][py+1] = 'ROAD';
                grid[px+1][py+1] = 'ROAD';
            }

            // Random direction
            const dir = Math.floor(seededRandom() * 4);
            if (dir === 0 && py > 2) py--;
            if (dir === 1 && py < GRID_SIZE - 3) py++;
            if (dir === 2 && px > 2) px--;
            if (dir === 3 && px < GRID_SIZE - 3) px++;
        }

        // Convert remaining untouched chunks into actual Buildings, Parks, Carparks
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                if (grid[x][y] === 'BUILDING') {
                    let type = 'building';
                    let roll = seededRandom();
                    if(roll < 0.2) type = 'park';
                    else if (roll < 0.3) type = 'carpark';
                    
                    zones.push({
                        px: x * TILE_SIZE, py: y * TILE_SIZE, 
                        pw: TILE_SIZE, ph: TILE_SIZE, type: type
                    });
                }
            }
        }
    }
    generateOrganicCity();

    // --- 4. MULTIPLAYER & INITIALIZATION ---
    function initCarsOnServer() {
        // Run once: If no cars exist on Firebase, spawn 3 random cars
        db.ref('cars').once('value', (snapshot) => {
            if (!snapshot.exists()) {
                const colors = ['#e74c3c', '#3498db', '#f1c40f'];
                for(let i=0; i<3; i++) {
                    db.ref('cars').push({
                        x: mapSize.width/2 + (Math.random() * 1000 - 500), 
                        y: mapSize.height/2 + (Math.random() * 1000 - 500),
                        angle: 0, velocity: 0,
                        color: colors[i], driverId: null
                    });
                }
            }
        });
    }

    document.getElementById('joinBtn').addEventListener('click', () => {
        const name = document.getElementById('playerName').value || "Guest";
        localPlayer.name = name; localPlayer.color = document.getElementById('playerColor').value;
        
        // Find safe spawn
        let spawned = false;
        for (let x=10; x<GRID_SIZE && !spawned; x++) {
            for (let y=10; y<GRID_SIZE && !spawned; y++) {
                if (grid[x][y] === 'ROAD') {
                    localPlayer.x = x * TILE_SIZE + 100; localPlayer.y = y * TILE_SIZE + 100;
                    spawned = true;
                }
            }
        }

        playerId = db.ref().child('players').push().key;
        db.ref(`players/${playerId}`).onDisconnect().remove();
        
        // Listeners
        db.ref('players').on('value', (snap) => {
            otherPlayers = snap.val() || {};
            delete otherPlayers[playerId]; 
        });
        db.ref('cars').on('value', (snap) => { cars = snap.val() || {}; });

        initCarsOnServer();

        document.getElementById('startMenu').style.display = 'none';
        if ('ontouchstart' in window) {
            document.getElementById('mobileControls').style.display = 'block';
            document.getElementById('actionBtn').style.display = 'block';
            setupMobileControls();
        }
        requestAnimationFrame(gameLoop);
    });

    // Sync loop
    setInterval(() => {
        if(playerId) db.ref(`players/${playerId}`).set(localPlayer);
    }, 50);

    // --- 5. CONTROLS ---
    window.addEventListener('keydown', (e) => { 
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
        if (e.key.toLowerCase() === 'e') handleAction();
    });
    window.addEventListener('keyup', (e) => { 
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; 
    });
    document.getElementById('actionBtn').addEventListener('touchstart', handleAction);

    function setupMobileControls() {
        const base = document.getElementById('joystickBase');
        const stick = document.getElementById('joystickStick');
        let active = false;

        base.addEventListener('touchstart', (e) => { active = true; updateJoystick(e); });
        base.addEventListener('touchmove', (e) => { if(active) updateJoystick(e); e.preventDefault(); }, {passive: false});
        base.addEventListener('touchend', () => { active = false; stick.style.transform = `translate(0px,0px)`; joystickVector = {x:0, y:0}; });

        function updateJoystick(e) {
            const rect = base.getBoundingClientRect();
            const touch = e.targetTouches[0];
            let dx = touch.clientX - (rect.left + rect.width / 2);
            let dy = touch.clientY - (rect.top + rect.height / 2);
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2);
            const angle = Math.atan2(dy, dx);
            joystickVector.x = Math.cos(angle) * (distance / (rect.width/2));
            joystickVector.y = Math.sin(angle) * (distance / (rect.width/2));
            stick.style.transform = `translate(${joystickVector.x*(rect.width/2)}px, ${joystickVector.y*(rect.width/2)}px)`;
        }
    }

    // --- 6. CAR JACKING MECHANIC ---
    function handleAction() {
        if (localPlayer.drivingId) {
            // Exit Car
            db.ref(`cars/${localPlayer.drivingId}`).update({ driverId: null });
            localPlayer.drivingId = null;
        } else {
            // Find nearest car to Steal
            for (let id in cars) {
                let c = cars[id];
                let dist = Math.sqrt(Math.pow(c.x - localPlayer.x, 2) + Math.pow(c.y - localPlayer.y, 2));
                if (dist < 60 && !c.driverId) { // 60px steal range
                    db.ref(`cars/${id}`).update({ driverId: playerId });
                    localPlayer.drivingId = id;
                    break;
                }
            }
        }
    }

    // --- 7. PHYSICS & GAME LOOP ---
    function checkBuildingCollision(px, py, radius) {
        let gx = Math.floor(px / TILE_SIZE);
        let gy = Math.floor(py / TILE_SIZE);
        // Simple optimization: only check if standing on a building tile
        if(gx >= 0 && gx < GRID_SIZE && gy >= 0 && gy < GRID_SIZE) {
            if(grid[gx][gy] === 'BUILDING') return true;
        }
        return false;
    }

    function update() {
        if (!playerId) return;

        if (localPlayer.drivingId && cars[localPlayer.drivingId]) {
            // --- DRIVING LOGIC ---
            let myCar = cars[localPlayer.drivingId];
            
            // Gas & Brake
            if (keys.w || joystickVector.y < -0.3) myCar.velocity += 0.3; // Accel
            if (keys.s || joystickVector.y > 0.3) myCar.velocity -= 0.3; // Reverse
            
            // Steering
            if (Math.abs(myCar.velocity) > 0.5) {
                let turnSpeed = 0.05 * (myCar.velocity > 0 ? 1 : -1);
                if (keys.a || joystickVector.x < -0.3) myCar.angle -= turnSpeed;
                if (keys.d || joystickVector.x > 0.3) myCar.angle += turnSpeed;
            }

            // Friction
            myCar.velocity *= 0.92;

            // Apply Velocity
            let nextX = myCar.x + Math.cos(myCar.angle) * myCar.velocity;
            let nextY = myCar.y + Math.sin(myCar.angle) * myCar.velocity;

            // Car-to-Car Bounce Physics (Elastic Circle Collision)
            for (let id in cars) {
                if (id !== localPlayer.drivingId) {
                    let other = cars[id];
                    let dist = Math.sqrt(Math.pow(nextX - other.x, 2) + Math.pow(nextY - other.y, 2));
                    if (dist < 40) { // Car radius is approx 20
                        myCar.velocity *= -0.5; // Bounce back
                        nextX = myCar.x; nextY = myCar.y;
                    }
                }
            }

            // Map Bounds & Building Collision
            if(nextX < 20 || nextX > mapSize.width-20 || nextY < 20 || nextY > mapSize.height-20 || checkBuildingCollision(nextX, nextY, 20)) {
                myCar.velocity *= -0.5; // Crash bounce
            } else {
                myCar.x = nextX; myCar.y = nextY;
            }

            // Sync Car
            db.ref(`cars/${localPlayer.drivingId}`).set(myCar);
            
            // Snap player to car for camera tracking
            localPlayer.x = myCar.x; localPlayer.y = myCar.y;

        } else {
            // --- WALKING LOGIC ---
            let vx = 0, vy = 0;
            
            // PC Input (Normalized to fix diagonal speed bug)
            if (keys.w) vy -= 1; if (keys.s) vy += 1;
            if (keys.a) vx -= 1; if (keys.d) vx += 1;
            
            if (vx !== 0 || vy !== 0) {
                let len = Math.sqrt(vx*vx + vy*vy);
                vx = (vx/len) * PLAYER_SPEED;
                vy = (vy/len) * PLAYER_SPEED;
            } else if (joystickVector.x !== 0 || joystickVector.y !== 0) {
                // Mobile Input
                vx = joystickVector.x * PLAYER_SPEED;
                vy = joystickVector.y * PLAYER_SPEED;
            }

            if (vx !== 0 || vy !== 0) {
                localPlayer.angle = Math.atan2(vy, vx);
                let nextX = localPlayer.x + vx;
                let nextY = localPlayer.y + vy;
                
                // Slide Collision
                if (!checkBuildingCollision(nextX, localPlayer.y, 15)) localPlayer.x = nextX;
                if (!checkBuildingCollision(localPlayer.x, nextY, 15)) localPlayer.y = nextY;
            }
        }

        // Camera Tracking
        const scaleFactor = canvas.height / TARGET_VIEW_HEIGHT;
        const visibleWidth = canvas.width / scaleFactor;
        camera.x = Math.max(0, Math.min(localPlayer.x - visibleWidth / 2, mapSize.width - visibleWidth));
        camera.y = Math.max(0, Math.min(localPlayer.y - TARGET_VIEW_HEIGHT / 2, mapSize.height - TARGET_VIEW_HEIGHT));
    }

    function draw() {
        ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        ctx.scale(canvas.height / TARGET_VIEW_HEIGHT, canvas.height / TARGET_VIEW_HEIGHT);
        ctx.translate(-camera.x, -camera.y); 

        // 1. Draw Asphalt Base
        ctx.fillStyle = '#444'; ctx.fillRect(0, 0, mapSize.width, mapSize.height);

        // 2. Draw Organic Zones
        for (let z of zones) {
            // Soft rounded sidewalk underprint
            ctx.fillStyle = '#666';
            ctx.beginPath(); ctx.roundRect(z.px - 20, z.py - 20, z.pw + 40, z.ph + 40, 40); ctx.fill();

            if (z.type === 'building') {
                ctx.fillStyle = '#2b2b2b'; 
                ctx.beginPath(); ctx.roundRect(z.px, z.py, z.pw, z.ph, 15); ctx.fill();
                ctx.fillStyle = '#1f1f1f'; 
                ctx.beginPath(); ctx.roundRect(z.px + 10, z.py + 10, z.pw - 20, z.ph - 20, 10); ctx.fill();
            } 
            else if (z.type === 'park') {
                ctx.fillStyle = '#3a6631'; 
                ctx.beginPath(); ctx.roundRect(z.px, z.py, z.pw, z.ph, 20); ctx.fill();
            }
            else if (z.type === 'carpark') {
                ctx.fillStyle = '#555'; 
                ctx.beginPath(); ctx.roundRect(z.px, z.py, z.pw, z.ph, 10); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                for (let px = z.px + 40; px < z.px + z.pw - 40; px += 40) {
                    ctx.beginPath(); ctx.moveTo(px, z.py + 10); ctx.lineTo(px, z.py + 60); ctx.stroke();
                }
            }
        }

        // 3. Draw Cars
        for (let id in cars) {
            let c = cars[id];
            ctx.save();
            ctx.translate(c.x, c.y); ctx.rotate(c.angle);
            
            // Car Body
            ctx.fillStyle = c.color;
            ctx.beginPath(); ctx.roundRect(-25, -15, 50, 30, 8); ctx.fill();
            
            // Windshield
            ctx.fillStyle = '#000';
            ctx.fillRect(-5, -12, 15, 24); // Front
            ctx.fillRect(-20, -10, 10, 20); // Back
            
            // Headlights
            ctx.fillStyle = '#fffaaa';
            ctx.beginPath(); ctx.arc(23, -10, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(23, 10, 3, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }

        // 4. Draw Players (Hide local if driving)
        for (const id in otherPlayers) {
            const p = otherPlayers[id];
            if(!p.drivingId) drawEntity(p.x, p.y, p.color, p.name, p.angle || 0);
        }
        if (!localPlayer.drivingId) drawEntity(localPlayer.x, localPlayer.y, localPlayer.color, localPlayer.name, localPlayer.angle);

        ctx.restore(); 
    }

    function drawEntity(x, y, color, name, angle) {
        ctx.save();
        ctx.translate(x, y); ctx.rotate(angle);
        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(0, 0, 14, 20, 0, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(12, 14, 4, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(12, -14, 4, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(4, 0, 10, 0, Math.PI*2); ctx.fill(); 
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke(); 
        ctx.restore(); 
        
        ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
        ctx.fillText(name, x, y - 30); 
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
