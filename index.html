<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down City Multiplayer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #startMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .menu-box { background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .menu-box input { margin: 10px; padding: 10px; font-size: 16px; }
        .menu-box button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        
        #mobileControls { position: absolute; bottom: 20px; left: 20px; display: none; z-index: 5; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        .joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }
        #actionBtn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.5); border-radius: 50%; display: none; z-index: 5; color: white; text-align: center; line-height: 80px; font-weight: bold; user-select: none;}
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h2>City Multiplayer</h2>
            <input type="text" id="playerName" placeholder="Enter Username" maxlength="12"><br>
            <label>Character Color: </label>
            <input type="color" id="playerColor" value="#ff0000"><br>
            <button id="joinBtn">Spawn In</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="joystick-base" id="joystickBase">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div id="actionBtn">STEAL</div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- 1. FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyDLt15iYS6MNWr5BxdE-4S-1WLM4ZAG1RM",
      authDomain: "feet-df8c7.firebaseapp.com",
      databaseURL: "https://feet-df8c7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "feet-df8c7",
      storageBucket: "feet-df8c7.firebasestorage.app",
      messagingSenderId: "388006445651",
      appId: "1:388006445651:web:9f6498a9a9aeee4e9d3ca6",
      measurementId: "G-EJ8KTJZFSM"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- 2. GAME STATE & VARIABLES ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let playerId = null;
    let playerRef = null;
    let localPlayer = { x: 0, y: 0, angle: 0, color: '#ff0000', name: 'Player', isDriving: false };
    let otherPlayers = {};
    
    const mapSize = { width: 4000, height: 4000 }; 
    const camera = { x: 0, y: 0 };
    const speed = 3; 
    const TARGET_VIEW_HEIGHT = 1000; 

    const keys = { w: false, a: false, s: false, d: false };
    let joystickVector = { x: 0, y: 0 };

    // --- 3. MAP GENERATION (SYNCED & CURVED) ---
    const zones = [];
    const roadWidth = 240; 
    const blockSize = 500;
    const sidewalkPadding = 30; 
    const blockSpacing = roadWidth + blockSize;

    // Sweeping Highways Data
    const highways = [
        // West to East S-Curve
        { p0: {x: -200, y: 1200}, p1: {x: 2000, y: 1200}, p2: {x: 2000, y: 2800}, p3: {x: 4200, y: 2800} },
        // North to South sweeping turn
        { p0: {x: 2800, y: -200}, p1: {x: 2800, y: 2000}, p2: {x: 800, y: 2000}, p3: {x: 800, y: 4200} }
    ];

    // Map Sync: Seeded Random Number Generator
    let mapSeed = 9999; 
    function seededRandom() {
        let x = Math.sin(mapSeed++) * 10000;
        return x - Math.floor(x);
    }

    // Helper for calculating curve coordinates
    function getBezierPoint(t, p0, p1, p2, p3) {
        let cx = 3 * (p1.x - p0.x), bx = 3 * (p2.x - p1.x) - cx, ax = p3.x - p0.x - cx - bx;
        let cy = 3 * (p1.y - p0.y), by = 3 * (p2.y - p1.y) - cy, ay = p3.y - p0.y - cy - by;
        let x = (ax * Math.pow(t, 3)) + (bx * Math.pow(t, 2)) + (cx * t) + p0.x;
        let y = (ay * Math.pow(t, 3)) + (by * Math.pow(t, 2)) + (cy * t) + p0.y;
        return {x, y};
    }

    function generateCity() {
        // 1. Generate base grid using seeded logic (Everyone gets the same map)
        for (let x = roadWidth; x < mapSize.width; x += blockSpacing) {
            for (let y = roadWidth; y < mapSize.height; y += blockSpacing) {
                const roll = seededRandom();
                let type = 'building';
                if (roll < 0.20) type = 'park';
                else if (roll < 0.35) type = 'carpark';
                
                zones.push({ x: x, y: y, w: blockSize, h: blockSize, type: type });
            }
        }

        // 2. Carve sweeping highway paths through the grid
        for (let i = zones.length - 1; i >= 0; i--) {
            let z = zones[i];
            let zcx = z.x + z.w/2;
            let zcy = z.y + z.h/2;
            let overlapsHighway = false;

            for (let h of highways) {
                // Sample points along the curve
                for(let t=0; t<=1; t+=0.02) {
                    let pt = getBezierPoint(t, h.p0, h.p1, h.p2, h.p3);
                    let dist = Math.sqrt(Math.pow(pt.x - zcx, 2) + Math.pow(pt.y - zcy, 2));
                    // If building center is near the curve, flag it
                    if (dist < 380) { 
                        overlapsHighway = true;
                        break;
                    }
                }
                if(overlapsHighway) break;
            }

            if (overlapsHighway) {
                // Flatten buildings on the highway path so players don't crash into invisible walls
                z.type = 'park'; 
                z.clearedForHighway = true; // Flag to stop trees from growing on the road
            }
        }
    }
    generateCity();

    // --- 4. INITIALIZATION & UI ---
    document.getElementById('joinBtn').addEventListener('click', () => {
        const name = document.getElementById('playerName').value || "Guest";
        const color = document.getElementById('playerColor').value;
        
        // Spawn positions remain truly random so players don't spawn on top of each other
        localPlayer.x = roadWidth / 2 + (Math.floor(Math.random() * 3) * blockSpacing);
        localPlayer.y = roadWidth / 2 + (Math.floor(Math.random() * 3) * blockSpacing);
        localPlayer.name = name;
        localPlayer.color = color;

        setupMultiplayer();
        document.getElementById('startMenu').style.display = 'none';
        
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobileControls').style.display = 'block';
            document.getElementById('actionBtn').style.display = 'block';
            setupMobileControls();
        }
        requestAnimationFrame(gameLoop);
    });

    // --- 5. MULTIPLAYER LOGIC ---
    function setupMultiplayer() {
        playerId = firebase.database().ref().child('players').push().key;
        playerRef = db.ref(`players/${playerId}`);
        playerRef.onDisconnect().remove();
        playerRef.set(localPlayer);

        db.ref('players').on('value', (snapshot) => {
            otherPlayers = snapshot.val() || {};
            delete otherPlayers[playerId]; 
        });
    }

    function updateServerPosition() {
        if (playerRef) playerRef.update({ x: localPlayer.x, y: localPlayer.y, angle: localPlayer.angle });
    }

    // --- 6. CONTROLS ---
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup',   (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    function setupMobileControls() {
        const base = document.getElementById('joystickBase');
        const stick = document.getElementById('joystickStick');
        let active = false;

        base.addEventListener('touchstart', (e) => { active = true; updateJoystick(e); });
        base.addEventListener('touchmove', (e) => { if(active) updateJoystick(e); e.preventDefault(); }, {passive: false});
        base.addEventListener('touchend', () => { 
            active = false; stick.style.transform = `translate(0px, 0px)`; joystickVector = {x: 0, y: 0}; 
        });

        function updateJoystick(e) {
            const rect = base.getBoundingClientRect();
            const touch = e.targetTouches[0];
            let dx = touch.clientX - (rect.left + rect.width / 2);
            let dy = touch.clientY - (rect.top + rect.height / 2);
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2);
            const angle = Math.atan2(dy, dx);
            joystickVector.x = Math.cos(angle) * (distance / (rect.width/2));
            joystickVector.y = Math.sin(angle) * (distance / (rect.width/2));
            stick.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;
        }
    }

    // --- 7. PHYSICS & COLLISIONS ---
    function checkCollision(px, py, radius) {
        for (let z of zones) {
            if (z.type === 'building') {
                let closestX = Math.max(z.x, Math.min(px, z.x + z.w));
                let closestY = Math.max(z.y, Math.min(py, z.y + z.h));
                if (Math.pow(px - closestX, 2) + Math.pow(py - closestY, 2) < (radius * radius)) {
                    return true; 
                }
            }
        }
        return false;
    }

    // --- 8. GAME LOOP & RENDERING ---
    function update() {
        let nextX = localPlayer.x;
        let nextY = localPlayer.y;

        if (keys.w) nextY -= speed;
        if (keys.s) nextY += speed;
        if (keys.a) nextX -= speed;
        if (keys.d) nextX += speed;

        if (joystickVector.x !== 0 || joystickVector.y !== 0) {
            nextX += joystickVector.x * speed;
            nextY += joystickVector.y * speed;
        }

        if (nextX !== localPlayer.x || nextY !== localPlayer.y) {
             localPlayer.angle = Math.atan2(nextY - localPlayer.y, nextX - localPlayer.x);
        }

        const playerRadius = 15;
        nextX = Math.max(playerRadius, Math.min(nextX, mapSize.width - playerRadius));
        nextY = Math.max(playerRadius, Math.min(nextY, mapSize.height - playerRadius));

        let moved = false;
        
        if (nextX !== localPlayer.x && !checkCollision(nextX, localPlayer.y, playerRadius)) {
            localPlayer.x = nextX; moved = true;
        }
        if (nextY !== localPlayer.y && !checkCollision(localPlayer.x, nextY, playerRadius)) {
            localPlayer.y = nextY; moved = true;
        }

        if (moved) updateServerPosition();

        const scaleFactor = canvas.height / TARGET_VIEW_HEIGHT;
        const visibleWidth = canvas.width / scaleFactor;

        camera.x = Math.max(0, Math.min(localPlayer.x - visibleWidth / 2, mapSize.width - visibleWidth));
        camera.y = Math.max(0, Math.min(localPlayer.y - TARGET_VIEW_HEIGHT / 2, mapSize.height - TARGET_VIEW_HEIGHT));
    }

    function draw() {
        ctx.fillStyle = '#111'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        const scaleFactor = canvas.height / TARGET_VIEW_HEIGHT;
        ctx.scale(scaleFactor, scaleFactor);
        ctx.translate(-camera.x, -camera.y); 

        // 1. Base Asphalt Grid
        ctx.fillStyle = '#444'; 
        ctx.fillRect(0, 0, mapSize.width, mapSize.height);

        // 2. Draw Map Zones (Buildings, Parks, Carparks)
        for (let z of zones) {
            // Sidewalks
            if(!z.clearedForHighway) {
                ctx.fillStyle = '#777';
                ctx.beginPath();
                ctx.roundRect(z.x - sidewalkPadding, z.y - sidewalkPadding, z.w + (sidewalkPadding*2), z.h + (sidewalkPadding*2), 30);
                ctx.fill();
            }

            if (z.type === 'building') {
                ctx.fillStyle = '#2b2b2b'; 
                ctx.beginPath(); ctx.roundRect(z.x, z.y, z.w, z.h, 15); ctx.fill();
                ctx.fillStyle = '#1f1f1f'; 
                ctx.beginPath(); ctx.roundRect(z.x + 20, z.y + 20, z.w - 40, z.h - 40, 10); ctx.fill();
            } 
            else if (z.type === 'park') {
                ctx.fillStyle = z.clearedForHighway ? '#444' : '#3a6631'; // Hide grass if it's a flattened highway section
                ctx.beginPath(); ctx.roundRect(z.x, z.y, z.w, z.h, 15); ctx.fill();

                if (!z.clearedForHighway) {
                    ctx.fillStyle = '#1e3819';
                    for(let i=0; i<6; i++) {
                        ctx.beginPath();
                        let tx = z.x + 50 + Math.abs(Math.sin(z.x + i) * (z.w - 100));
                        let ty = z.y + 50 + Math.abs(Math.cos(z.y + i) * (z.h - 100));
                        ctx.arc(tx, ty, 30 + (i*2), 0, Math.PI * 2); ctx.fill();
                    }
                }
            }
            else if (z.type === 'carpark') {
                ctx.fillStyle = '#555'; 
                ctx.beginPath(); ctx.roundRect(z.x, z.y, z.w, z.h, 15); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                for (let px = z.x + 60; px < z.x + z.w - 60; px += 50) {
                    ctx.beginPath(); ctx.moveTo(px, z.y + 20); ctx.lineTo(px, z.y + 100); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(px, z.y + z.h - 20); ctx.lineTo(px, z.y + z.h - 100); ctx.stroke();
                }
            }
        }

        // 3. Draw Grid Road Centerlines
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([30, 30]);
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let x = roadWidth/2; x < mapSize.width; x += blockSpacing) { ctx.moveTo(x, 0); ctx.lineTo(x, mapSize.height); }
        for (let y = roadWidth/2; y < mapSize.height; y += blockSpacing) { ctx.moveTo(0, y); ctx.lineTo(mapSize.width, y); }
        ctx.stroke();
        ctx.setLineDash([]); 

        // 4. DRAW SWEEPING HIGHWAYS OVERLAY
        for (let h of highways) {
            // Sweeping Sidewalk underneath
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 300 + (sidewalkPadding * 2);
            ctx.lineCap = 'butt';
            ctx.beginPath(); ctx.moveTo(h.p0.x, h.p0.y); ctx.bezierCurveTo(h.p1.x, h.p1.y, h.p2.x, h.p2.y, h.p3.x, h.p3.y); ctx.stroke();
            
            // Sweeping Asphalt
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 300;
            ctx.beginPath(); ctx.moveTo(h.p0.x, h.p0.y); ctx.bezierCurveTo(h.p1.x, h.p1.y, h.p2.x, h.p2.y, h.p3.x, h.p3.y); ctx.stroke();

            // Sweeping Centerline
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 6;
            ctx.setLineDash([60, 40]);
            ctx.beginPath(); ctx.moveTo(h.p0.x, h.p0.y); ctx.bezierCurveTo(h.p1.x, h.p1.y, h.p2.x, h.p2.y, h.p3.x, h.p3.y); ctx.stroke();
            ctx.setLineDash([]);
        }

        // 5. Draw Players
        for (const id in otherPlayers) {
            const p = otherPlayers[id];
            drawEntity(p.x, p.y, p.color, p.name, false, p.angle || 0);
        }
        drawEntity(localPlayer.x, localPlayer.y, localPlayer.color, localPlayer.name, true, localPlayer.angle);

        ctx.restore(); 
    }

    function drawEntity(x, y, color, name, isLocal = false, angle = 0) {
        ctx.save();
        ctx.translate(x, y); ctx.rotate(angle);

        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(0, 0, 16, 22, 0, 0, Math.PI * 2); ctx.fill(); // Body
        ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(14, 15, 5, 0, Math.PI * 2); ctx.fill(); // Hand R
        ctx.beginPath(); ctx.arc(14, -15, 5, 0, Math.PI * 2); ctx.fill(); // Hand L
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(4, 0, 12, 0, Math.PI * 2); ctx.fill(); // Head
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); // Head Outline

        ctx.restore(); 
        ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
        ctx.shadowColor = "black"; ctx.shadowBlur = 4; ctx.fillText(name, x, y - 35); ctx.shadowBlur = 0; 
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
