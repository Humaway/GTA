<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down City Multiplayer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlays */
        #startMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .menu-box { background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .menu-box input { margin: 10px; padding: 10px; font-size: 16px; }
        .menu-box button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        
        /* Mobile Controls */
        #mobileControls { position: absolute; bottom: 20px; left: 20px; display: none; z-index: 5; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        .joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }
        #actionBtn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.5); border-radius: 50%; display: none; z-index: 5; color: white; text-align: center; line-height: 80px; font-weight: bold; user-select: none;}
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h2>City Multiplayer</h2>
            <input type="text" id="playerName" placeholder="Enter Username" maxlength="12"><br>
            <label>Character Color: </label>
            <input type="color" id="playerColor" value="#ff0000"><br>
            <button id="joinBtn">Spawn In</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="joystick-base" id="joystickBase">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div id="actionBtn">STEAL</div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- 1. FIREBASE SETUP (REPLACE WITH YOUR CONFIG) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDLt15iYS6MNWr5BxdE-4S-1WLM4ZAG1RM",
      authDomain: "feet-df8c7.firebaseapp.com",
      databaseURL: "https://feet-df8c7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "feet-df8c7",
      storageBucket: "feet-df8c7.firebasestorage.app",
      messagingSenderId: "388006445651",
      appId: "1:388006445651:web:9f6498a9a9aeee4e9d3ca6",
      measurementId: "G-EJ8KTJZFSM"
    };
    
    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- 2. GAME STATE & VARIABLES ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let playerId = null;
    let playerRef = null;
    let localPlayer = { x: 0, y: 0, color: '#ff0000', name: 'Player', isDriving: false };
    let otherPlayers = {};
    let npcs = []; 
    
    // Map & Camera definitions
    const mapSize = { width: 3000, height: 3000 }; 
    const camera = { x: 0, y: 0 };

    // Inputs
    const keys = { w: false, a: false, s: false, d: false };
    let joystickVector = { x: 0, y: 0 };
    const speed = 5;

    // --- 3. INITIALIZATION & UI ---
    document.getElementById('joinBtn').addEventListener('click', () => {
        const name = document.getElementById('playerName').value || "Guest";
        const color = document.getElementById('playerColor').value;
        
        // Random spawn within the new 3000x3000 map
        localPlayer.x = Math.floor(Math.random() * (mapSize.width - 200)) + 100;
        localPlayer.y = Math.floor(Math.random() * (mapSize.height - 200)) + 100;
        localPlayer.name = name;
        localPlayer.color = color;

        setupMultiplayer();
        
        document.getElementById('startMenu').style.display = 'none';
        
        // Detect mobile for controls
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobileControls').style.display = 'block';
            document.getElementById('actionBtn').style.display = 'block';
            setupMobileControls();
        }

        requestAnimationFrame(gameLoop);
    });

    // --- 4. MULTIPLAYER LOGIC ---
    function setupMultiplayer() {
        playerId = firebase.database().ref().child('players').push().key;
        playerRef = db.ref(`players/${playerId}`);

        // Remove player when they close the tab/disconnect
        playerRef.onDisconnect().remove();

        // Push initial state
        playerRef.set(localPlayer);

        // Listen for other players
        db.ref('players').on('value', (snapshot) => {
            otherPlayers = snapshot.val() || {};
            delete otherPlayers[playerId]; // Don't track ourselves
        });
    }

    function updateServerPosition() {
        if (playerRef) {
            playerRef.update({ x: localPlayer.x, y: localPlayer.y });
        }
    }

    // --- 5. CONTROLS (DESKTOP & MOBILE) ---
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup',   (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    function setupMobileControls() {
        const base = document.getElementById('joystickBase');
        const stick = document.getElementById('joystickStick');
        let active = false;

        base.addEventListener('touchstart', (e) => { active = true; updateJoystick(e); });
        base.addEventListener('touchmove', (e) => { if(active) updateJoystick(e); e.preventDefault(); }, {passive: false});
        base.addEventListener('touchend', () => { 
            active = false; 
            stick.style.transform = `translate(0px, 0px)`; 
            joystickVector = {x: 0, y: 0}; 
        });

        function updateJoystick(e) {
            const rect = base.getBoundingClientRect();
            const touch = e.targetTouches[0];
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2);
            const angle = Math.atan2(dy, dx);

            joystickVector.x = Math.cos(angle) * (distance / (rect.width/2));
            joystickVector.y = Math.sin(angle) * (distance / (rect.width/2));

            stick.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;
        }
    }

    // --- 6. GAME LOOP & RENDERING ---
    function update() {
        let moved = false;

        // Desktop movement
        if (keys.w) { localPlayer.y -= speed; moved = true; }
        if (keys.s) { localPlayer.y += speed; moved = true; }
        if (keys.a) { localPlayer.x -= speed; moved = true; }
        if (keys.d) { localPlayer.x += speed; moved = true; }

        // Mobile movement
        if (joystickVector.x !== 0 || joystickVector.y !== 0) {
            localPlayer.x += joystickVector.x * speed;
            localPlayer.y += joystickVector.y * speed;
            moved = true;
        }

        // Clamp player to map boundaries
        const playerRadius = 15;
        localPlayer.x = Math.max(playerRadius, Math.min(localPlayer.x, mapSize.width - playerRadius));
        localPlayer.y = Math.max(playerRadius, Math.min(localPlayer.y, mapSize.height - playerRadius));

        if (moved) updateServerPosition();

        // --- CAMERA LOGIC ---
        // Center camera on player
        camera.x = localPlayer.x - canvas.width / 2;
        camera.y = localPlayer.y - canvas.height / 2;

        // Clamp camera to map edges 
        camera.x = Math.max(0, Math.min(camera.x, mapSize.width - canvas.width));
        camera.y = Math.max(0, Math.min(camera.y, mapSize.height - canvas.height));
    }

    function draw() {
        // Clear out-of-bounds background
        ctx.fillStyle = '#222'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- APPLY CAMERA TRANSFORM ---
        ctx.save();
        ctx.translate(-camera.x, -camera.y); 

        // Draw Map Ground (Asphalt)
        ctx.fillStyle = '#555'; 
        ctx.fillRect(0, 0, mapSize.width, mapSize.height);

        // Procedural City Blocks
        ctx.fillStyle = '#333'; 
        const blockSize = 400;
        const roadWidth = 120;
        for (let x = roadWidth; x < mapSize.width; x += blockSize + roadWidth) {
            for (let y = roadWidth; y < mapSize.height; y += blockSize + roadWidth) {
                ctx.fillRect(x, y, blockSize, blockSize);
            }
        }

        // Draw Road Centerlines
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([20, 20]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = roadWidth/2; x < mapSize.width; x += blockSize + roadWidth) {
            ctx.moveTo(x, 0); ctx.lineTo(x, mapSize.height);
        }
        for (let y = roadWidth/2; y < mapSize.height; y += blockSize + roadWidth) {
            ctx.moveTo(0, y); ctx.lineTo(mapSize.width, y);
        }
        ctx.stroke();
        ctx.setLineDash([]); 

        // Draw Other Players
        for (const id in otherPlayers) {
            const p = otherPlayers[id];
            drawEntity(p.x, p.y, p.color, p.name);
        }

        // Draw Local Player
        drawEntity(localPlayer.x, localPlayer.y, localPlayer.color, localPlayer.name, true);

        // --- RESTORE CANVAS STATE ---
        ctx.restore(); 
    }

    function drawEntity(x, y, color, name, isLocal = false) {
        // Draw Character
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, Math.PI * 2);
        ctx.fill();
        
        // Stroke for local player
        if (isLocal) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw Nameplate
        ctx.fillStyle = 'white';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y - 25);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
